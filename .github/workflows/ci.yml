name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Capture immutable build identity
        run: echo "VITE_BUILD_ID=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser dependencies
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run unit and static tests
        run: npm test

      - name: Run full Chromium e2e suite
        run: npm run test:e2e -- --project=chromium

      - name: Run Firefox and WebKit critical-path smoke
        run: >-
          npx playwright test
          tests/e2e/accessibility-navigation.spec.js
          tests/e2e/assessment-integrity.spec.js
          tests/e2e/right-sizing-governance.spec.js
          --project=firefox
          --project=webkit

      - name: Build production bundle
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev
